<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>Temperatura IoT</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 400px;
        margin: 60px auto;
        padding: 0 20px;
      }

      h1 {
        font-size: 1.2rem;
        margin-bottom: 30px;
      }

      .atual {
        font-size: 3rem;
        font-weight: bold;
        margin-bottom: 6px;
      }
      .hora {
        color: gray;
        font-size: 0.9rem;
        margin-bottom: 20px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th,
      td {
        text-align: left;
        padding: 8px;
        border-bottom: 1px solid #ddd;
      }
      th {
        font-size: 0.85rem;
        color: gray;
      }
    </style>
  </head>
  <body>
    <h1>🌡️ Sensor de Temperatura</h1>

    <div class="atual" id="valor">--°C</div>
    <div class="hora" id="hora">A aguardar dados...</div>

    <table>
      <thead>
        <tr>
          <th>Hora</th>
          <th>Temperatura</th>
        </tr>
      </thead>
      <tbody id="historico"></tbody>
    </table>

    <script>
      async function atualizar() {
        const data = await fetch("/dados").then((r) => r.json());
        if (data.length === 0) return;

        const ultima = data[data.length - 1];
        document.getElementById("valor").textContent = ultima.valor + "°C";
        document.getElementById("hora").textContent = "às " + ultima.hora;

        document.getElementById("historico").innerHTML = [...data]
          .reverse()
          .map((d) => `<tr><td>${d.hora}</td><td>${d.valor}°C</td></tr>`)
          .join("");
      }

      atualizar();
      setInterval(atualizar, 2000);
    </script>
  </body>
</html>
